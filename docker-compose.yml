services:
  api:
    # имя сервиса; если бы добавляли БД, тут была бы вторая запись db:
    build: . # собирать из Dockerfile в текущей папке
    image: api-task:latest # имя собранного образа; latest — стандартный тег "самая свежая"
    container_name: api-task # фиксированное имя контейнера, чтобы было удобно адресовать в docker logs/stop
    ports:
      - "8000:8000" # слева — порт ноутбука, справа — порт внутри контейнера. Кавычки обязательны
    environment:
      # переменные окружения для приложения внутри контейнера
      LOG_LEVEL: ${LOG_LEVEL:-INFO} # значение из окружения хоста, по умолчанию INFO
      DEBUG: ${DEBUG:-false}
    restart: unless-stopped # если контейнер упал — Docker сам перезапустит (но не если вы остановили его руками)
